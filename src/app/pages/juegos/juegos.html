<div class="container mt-5 pt-5 hero-section">

  <!-- outlet de rutas hijas; expongo la ref para saber si hay hijo activo -->
  <div class="row">
    <div class="col-12">
      <router-outlet #childOutlet="outlet"></router-outlet>
    </div>
  </div>

  @if (!childOutlet.isActivated) {
    <!--titulo principal-->
    <div class="row mb-5">
      <div class="col-12 text-center">
        <h1 class="hero-title fw-bold text-primary mb-2">
          <i class="bi bi-controller me-2"></i>
          Sala de Juegos
        </h1>
        <p class="lead text-light mb-4">
          Elige tu juego favorito y comienza la diversión
        </p>
      </div>
    </div>

    <!--seccion de juegos-->
    @if (usuario$ | async) {
      <div class="row mb-5">
        <div class="col-12">
          <!--grilla de juegos-->
          <div class="row g-4">
            @for (juego of juegos; track $index) {
              <div class="col-md-6 col-lg-3">
                <!--card del juego-->
                <div class="card h-100 game-card" [class.disabled]="!juego.disponible">
                  <div class="card-body text-center">
                    <i class="{{ juego.icono }} display-4 text-primary mb-3"></i>
                    <h5 class="card-title"><span class="text-light">{{ juego.nombre }}</span></h5>
                    <p class="card-text text-muted">{{ juego.descripcion }}</p>

                    <div class="mt-auto">
                      @if (!juego.disponible) {
                        <span class="badge bg-secondary">Sprint {{ juego.sprint }}</span>
                      }
                      @if (juego.disponible) {
                        <button class="btn btn-primary" (click)="jugarJuego(juego.ruta)">
                          Jugar
                        </button>
                      }
                    </div>
                  </div>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    }
  }
</div>
